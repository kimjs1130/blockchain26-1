<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockchain Lab #3</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ethers.js v6 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-6">

  <!-- Header -->
  <header class="mb-8">
    <h1 class="text-3xl font-bold">Blockchain Lab #3</h1>
  </header>

  <!-- Grid -->
  <div class="grid md:grid-cols-2 gap-6">

    <!-- Card 1: Wallet -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-6 shadow-lg">
      
      <!-- Title -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">지갑 연결</h2>
        <div id="status" class="flex items-center gap-2 text-sm">
          <span id="status-dot" class="w-3 h-3 rounded-full bg-gray-500"></span>
          <span id="status-text">미연결</span>
        </div>
      </div>

      <!-- Button -->
      <button id="connectBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 transition rounded-xl py-2 mb-4">
        MetaMask 연결
      </button>

      <!-- Wallet Info -->
      <div id="walletInfo" class="hidden space-y-2 text-sm">
        <p><span class="text-gray-400">주소:</span> <span id="address"></span></p>
        <p><span class="text-gray-400">잔액:</span> <span id="balance"></span> ETH</p>
        <p><span class="text-gray-400">Nonce:</span> <span id="nonce"></span></p>
      </div>

      <!-- Warning -->
      <div id="warning" class="hidden mt-4 p-3 bg-red-900/40 border border-red-700 rounded-xl text-sm">
        Faucet에서 ETH를 받아오세요
      </div>

      <!-- No Metamask -->
      <div id="noMetamask" class="hidden mt-4 text-red-400 text-sm">
        MetaMask가 설치되어 있지 않습니다.
      </div>

    </div>

  </div>

<script>
  let provider;
  let signer;

  const connectBtn = document.getElementById("connectBtn");
  const walletInfo = document.getElementById("walletInfo");
  const addressEl = document.getElementById("address");
  const balanceEl = document.getElementById("balance");
  const nonceEl = document.getElementById("nonce");
  const warning = document.getElementById("warning");
  const noMetamask = document.getElementById("noMetamask");

  const statusDot = document.getElementById("status-dot");
  const statusText = document.getElementById("status-text");

  connectBtn.onclick = async () => {
    if (!window.ethereum) {
      noMetamask.classList.remove("hidden");
      return;
    }

    try {
      provider = new ethers.BrowserProvider(window.ethereum);
      await window.ethereum.request({ method: "eth_requestAccounts" });

      signer = await provider.getSigner();
      const address = await signer.getAddress();

      // UI update
      statusDot.classList.remove("bg-gray-500");
      statusDot.classList.add("bg-green-500");
      statusText.textContent = "연결됨";

      walletInfo.classList.remove("hidden");

      addressEl.textContent = address;

      // Balance
      const balance = await provider.getBalance(address);
      const eth = ethers.formatEther(balance);
      balanceEl.textContent = Number(eth).toFixed(4);

      // Nonce
      const nonce = await provider.getTransactionCount(address);
      nonceEl.textContent = nonce;

      // Warning if 0
      if (parseFloat(eth) === 0) {
        warning.classList.remove("hidden");
      } else {
        warning.classList.add("hidden");
      }

    } catch (err) {
      console.error(err);
    }
  };
</script>

</body>
</html>
