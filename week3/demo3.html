<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blockchain Lab #3</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-8">Blockchain Lab #3</h1>

  <div class="grid md:grid-cols-2 gap-6">

    <!-- Card 1 -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-6">
      <div class="flex justify-between mb-4">
        <h2 class="text-xl font-semibold">Wallet Connection</h2>
        <div class="flex items-center gap-2 text-sm">
          <span id="status-dot" class="w-3 h-3 bg-gray-500 rounded-full"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </div>

      <button id="connectBtn" class="w-full bg-blue-600 py-2 rounded-xl mb-4">
        Connect MetaMask
      </button>

      <div id="walletInfo" class="hidden text-sm space-y-2">
        <p>Address: <span id="address"></span></p>
        <p>Balance: <span id="balance"></span> ETH</p>
        <p>Nonce: <span id="nonce"></span></p>
      </div>

      <div id="warning" class="hidden mt-3 text-red-400 text-sm">
        Please get ETH from a faucet
      </div>

      <div id="noMeta" class="hidden text-red-400 mt-3">
        MetaMask is not installed
      </div>
    </div>

    <!-- Card 2 -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-6">
      <h2 class="text-xl font-semibold mb-4">Send ETH</h2>

      <input id="to" class="w-full p-2 rounded bg-gray-700 mb-3"
        placeholder="Recipient Address (0x...)" />

      <input id="amount" type="number" value="0.001"
        class="w-full p-2 rounded bg-gray-700 mb-3" />

      <button id="previewBtn"
        class="w-full bg-gray-600 py-2 rounded mb-2" disabled>
        Preview
      </button>

      <button id="sendBtn"
        class="w-full bg-green-600 py-2 rounded mb-3" disabled>
        Send Transaction
      </button>

      <div id="preview" class="text-sm text-gray-300"></div>
      <div id="result" class="text-sm mt-3"></div>
    </div>

  </div>

  <!-- Card 3 -->
  <div class="bg-gray-800 rounded-2xl border border-gray-700 p-6 mt-6">
    <h2 class="text-xl font-semibold mb-4">Transaction Tracker</h2>

    <input id="txHash"
      class="w-full p-2 rounded bg-gray-700 mb-3"
      placeholder="TX Hash (0x...)" />

    <button id="trackBtn"
      class="w-full bg-indigo-600 py-2 rounded mb-4">
      Track
    </button>

    <div id="txResult" class="space-y-4"></div>
  </div>

<script>
let provider, signer, currentAddress;

// ✅ 안정적인 RPC로 변경
const rpcUrl = "https://ethereum-sepolia.publicnode.com";
const readProvider = new ethers.JsonRpcProvider(rpcUrl);

// CONNECT
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) {
    document.getElementById("noMeta").classList.remove("hidden");
    return;
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await window.ethereum.request({ method: "eth_requestAccounts" });

  signer = await provider.getSigner();
  currentAddress = await signer.getAddress();

  document.getElementById("status-dot").classList.replace("bg-gray-500","bg-green-500");
  document.getElementById("status-text").textContent = "Connected";

  document.getElementById("walletInfo").classList.remove("hidden");
  document.getElementById("address").textContent = currentAddress;

  const balance = await provider.getBalance(currentAddress);
  const eth = ethers.formatEther(balance);
  document.getElementById("balance").textContent = Number(eth).toFixed(4);

  const nonce = await provider.getTransactionCount(currentAddress);
  document.getElementById("nonce").textContent = nonce;

  if (parseFloat(eth) === 0) {
    document.getElementById("warning").classList.remove("hidden");
  }

  document.getElementById("previewBtn").disabled = false;
  document.getElementById("sendBtn").disabled = false;
};

// PREVIEW
document.getElementById("previewBtn").onclick = async () => {
  try {
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    ethers.getAddress(to);
    if (amount <= 0) throw new Error();

    const nonce = await provider.getTransactionCount(currentAddress);

    document.getElementById("preview").innerHTML = `
      Nonce: ${nonce}<br>
      Estimated Gas Limit: 21000
    `;
  } catch {
    alert("Invalid address or amount");
  }
};

// SEND
document.getElementById("sendBtn").onclick = async () => {
  const result = document.getElementById("result");

  try {
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    ethers.getAddress(to);
    if (amount <= 0) throw new Error();

    result.innerHTML = "Processing transaction...";

    const tx = await signer.sendTransaction({
      to,
      value: ethers.parseEther(amount)
    });

    const receipt = await tx.wait();

    const gasPrice = receipt.effectiveGasPrice ?? tx.gasPrice ?? 0n;
    const fee = receipt.gasUsed * gasPrice;

    result.innerHTML = `
      TX Hash: ${tx.hash}<br>
      Nonce: ${tx.nonce}<br>
      Gas Used: ${receipt.gasUsed}<br>
      Fee: ${ethers.formatEther(fee)} ETH<br>
      Status: ${receipt.status === 1 ? "Success" : "Fail"}<br>
      <a href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank" class="text-blue-400">
        View on Explorer
      </a>
    `;

  } catch (err) {
    if (err.code === 4001) {
      result.innerHTML = "User rejected transaction";
    } else if (err.message.includes("insufficient")) {
      result.innerHTML = "Insufficient balance";
    } else {
      result.innerHTML = "Error: " + err.message;
    }
  }
};

// TRACK (🔥 완전 안정 버전)
document.getElementById("trackBtn").onclick = async () => {
  try {
    let hash = document.getElementById("txHash").value.trim();

    // ✅ 입력 검증
    if (!hash.startsWith("0x") || hash.length !== 66) {
      document.getElementById("txResult").innerHTML = "Invalid TX hash format";
      return;
    }

    document.getElementById("txResult").innerHTML = "Loading...";

    console.log("Tracking:", hash);

    const tx = await readProvider.getTransaction(hash);
    const receipt = await readProvider.getTransactionReceipt(hash);

    console.log("tx:", tx);
    console.log("receipt:", receipt);

    if (!tx || !receipt) {
      document.getElementById("txResult").innerHTML =
        "Transaction not found (pending or wrong network)";
      return;
    }

    const gasPrice = receipt.effectiveGasPrice ?? tx.gasPrice ?? 0n;
    const fee = receipt.gasUsed * gasPrice;

    document.getElementById("txResult").innerHTML = `
      <div class="bg-gray-700 p-4 rounded-xl">
        From: ${tx.from}<br>
        To: ${tx.to}<br>
        Value: ${ethers.formatEther(tx.value)} ETH<br>
        Status: ${receipt.status === 1 ? "Success" : "Fail"}<br>
        <a href="https://sepolia.etherscan.io/tx/${hash}" target="_blank" class="text-blue-400">Explorer</a>
      </div>

      <div class="bg-indigo-800 p-4 rounded-xl text-center">
        <p class="text-3xl">${tx.nonce}</p>
        <p>Transaction sequence number</p>
      </div>

      <div class="bg-orange-800 p-4 rounded-xl">
        Gas Limit: ${tx.gasLimit}<br>
        Gas Used: ${receipt.gasUsed}<br>
        Gas Price: ${ethers.formatUnits(gasPrice, "gwei")} Gwei<br>
        Fee: ${ethers.formatEther(fee)} ETH
      </div>

      <div class="bg-purple-800 p-4 rounded-xl break-all font-mono">
        r: ${tx.r}<br>
        s: ${tx.s}<br>
        v: ${tx.v}
      </div>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("txResult").innerHTML =
      "Error: " + err.message;
  }
};
</script>

</body>
</html>
