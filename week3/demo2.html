<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blockchain Lab #3</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-8">Blockchain Lab #3</h1>

  <div class="grid md:grid-cols-2 gap-6">

    <!-- Card 1 -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-6">
      <div class="flex justify-between mb-4">
        <h2 class="text-xl font-semibold">지갑 연결</h2>
        <div class="flex items-center gap-2 text-sm">
          <span id="status-dot" class="w-3 h-3 bg-gray-500 rounded-full"></span>
          <span id="status-text">미연결</span>
        </div>
      </div>

      <button id="connectBtn" class="w-full bg-blue-600 py-2 rounded-xl mb-4">
        MetaMask 연결
      </button>

      <div id="walletInfo" class="hidden text-sm space-y-2">
        <p>주소: <span id="address"></span></p>
        <p>잔액: <span id="balance"></span> ETH</p>
        <p>Nonce: <span id="nonce"></span></p>
      </div>

      <div id="warning" class="hidden mt-3 text-red-400 text-sm">
        Faucet에서 ETH를 받아오세요
      </div>

      <div id="noMeta" class="hidden text-red-400 mt-3">
        MetaMask 없음
      </div>
    </div>

    <!-- Card 2 -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-6">
      <h2 class="text-xl font-semibold mb-4">ETH 송금</h2>

      <input id="to" class="w-full p-2 rounded bg-gray-700 mb-3"
        placeholder="0x..." />

      <input id="amount" type="number" value="0.001"
        class="w-full p-2 rounded bg-gray-700 mb-3" />

      <button id="previewBtn"
        class="w-full bg-gray-600 py-2 rounded mb-2" disabled>
        미리보기
      </button>

      <button id="sendBtn"
        class="w-full bg-green-600 py-2 rounded mb-3" disabled>
        송금 실행
      </button>

      <div id="preview" class="text-sm text-gray-300"></div>
      <div id="result" class="text-sm mt-3"></div>
    </div>

  </div>

<script>
let provider, signer, currentAddress;

const connectBtn = document.getElementById("connectBtn");
const previewBtn = document.getElementById("previewBtn");
const sendBtn = document.getElementById("sendBtn");

connectBtn.onclick = async () => {
  if (!window.ethereum) {
    document.getElementById("noMeta").classList.remove("hidden");
    return;
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await window.ethereum.request({ method: "eth_requestAccounts" });

  signer = await provider.getSigner();
  currentAddress = await signer.getAddress();

  document.getElementById("status-dot").classList.replace("bg-gray-500","bg-green-500");
  document.getElementById("status-text").textContent = "연결됨";

  document.getElementById("walletInfo").classList.remove("hidden");

  document.getElementById("address").textContent = currentAddress;

  const balance = await provider.getBalance(currentAddress);
  const eth = ethers.formatEther(balance);

  document.getElementById("balance").textContent = Number(eth).toFixed(4);

  const nonce = await provider.getTransactionCount(currentAddress);
  document.getElementById("nonce").textContent = nonce;

  if (parseFloat(eth) === 0) {
    document.getElementById("warning").classList.remove("hidden");
  }

  previewBtn.disabled = false;
  sendBtn.disabled = false;
};

// 미리보기
previewBtn.onclick = async () => {
  try {
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    ethers.getAddress(to);
    if (amount <= 0) throw new Error("금액 오류");

    const nonce = await provider.getTransactionCount(currentAddress);

    document.getElementById("preview").innerHTML = `
      Nonce: ${nonce}<br>
      예상 Gas Limit: 21000
    `;
  } catch {
    alert("주소 또는 금액 오류");
  }
};

// 송금
sendBtn.onclick = async () => {
  const result = document.getElementById("result");

  try {
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    ethers.getAddress(to);
    if (amount <= 0) throw new Error("금액 오류");

    result.innerHTML = "트랜잭션 처리 중...";

    const tx = await signer.sendTransaction({
      to,
      value: ethers.parseEther(amount)
    });

    const receipt = await tx.wait();

    const fee = receipt.gasUsed * receipt.gasPrice;

    result.innerHTML = `
      TX Hash: ${tx.hash}<br>
      Nonce: ${tx.nonce}<br>
      Gas Used: ${receipt.gasUsed}<br>
      Fee: ${ethers.formatEther(fee)} ETH<br>
      상태: ${receipt.status === 1 ? "성공" : "실패"}<br>
      <a href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank" class="text-blue-400">
        Explorer 보기
      </a>
    `;

  } catch (err) {

    if (err.code === 4001) {
      result.innerHTML = "사용자가 트랜잭션을 거절했습니다";
    } else if (err.message.includes("insufficient funds")) {
      result.innerHTML = "잔액 부족";
    } else {
      result.innerHTML = "에러 발생";
    }

  }
};
</script>

</body>
</html>
